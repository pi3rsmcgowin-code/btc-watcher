name: btc-long-watcher

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 min (UTC); GitHub may delay under load
  workflow_dispatch: {}       # adds a manual "Run workflow" button

permissions:
  contents: write             # lets it save state.json back so it won't re-spam

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check funding and alert
        env:
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
        run: python watch.py
      - name: Save state
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "btc-watcher"
            git config user.email "actions@github.com"
            git add state.json
            git commit -m "update state"
            git push
          fi
