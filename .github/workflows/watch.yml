name: btc-long-watcher
 
on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 min (UTC); GitHub may delay under load
  workflow_dispatch: {}
 
permissions:
  contents: write
 
jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check funding, alert, paper-trade, broadcast
        env:
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
        run: python watch.py
      - name: Save state and paper log
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "btc-watcher"
            git config user.email "actions@github.com"
            git add -A
            git commit -m "update state + paper log"
            git pull --rebase --autostash && git push
          fi
